<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1320" viewBox="0 0 900 1320">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 800 34px sans-serif; fill: #172033; }
      .sub { font: 500 15px sans-serif; fill: #667085; }
      .section { font: 800 20px sans-serif; fill: #223047; }
      .h { font: 800 17px sans-serif; fill: #172033; }
      .t { font: 500 13.5px sans-serif; fill: #475467; }
      .small { font: 500 12.5px sans-serif; fill: #667085; }
      .pipeline { fill: #eaf2ff; stroke: #78a9ff; stroke-width: 1.5; }
      .server { fill: #ecfdf5; stroke: #4ac180; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #b8c2d2; stroke-width: 1.4; }
      .codex { fill: #f3e8ff; stroke: #9b6cf3; stroke-width: 1.5; }
      .ext { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; }
      .note { fill: #fff8db; stroke: #f4c542; stroke-width: 1.4; }
      .arrow { stroke: #56657a; stroke-width: 2.4; fill: none; }
      .purple { stroke: #7e3ff2; stroke-width: 2.5; fill: none; }
      .orange { stroke: #d97706; stroke-width: 2.3; fill: none; stroke-dasharray: 8 6; }
      .green { stroke: #159957; stroke-width: 2.3; fill: none; }
      .shadow { filter: drop-shadow(0 6px 14px rgba(23, 32, 51, 0.08)); }
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#56657a"/>
    </marker>
    <marker id="p" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7e3ff2"/>
    </marker>
    <marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d97706"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="1320"/>

  <text x="48" y="58" class="title">Discord Bot 운영 인프라</text>
  <text x="48" y="86" class="sub">GitHub Actions 배포 + PM2 런타임 + Codex app-server 연결 구조</text>

  <rect x="40" y="116" width="820" height="330" rx="20" class="pipeline shadow"/>
  <text x="70" y="154" class="section">1. 배포 파이프라인</text>

  <rect x="105" y="184" width="690" height="54" rx="12" class="box"/>
  <text x="132" y="207" class="h">GitHub main push</text>
  <text x="132" y="226" class="t">main 브랜치에 커밋/푸시</text>

  <path d="M450 238 V266" class="arrow" marker-end="url(#a)"/>
  <rect x="105" y="266" width="690" height="54" rx="12" class="box"/>
  <text x="132" y="289" class="h">GitHub Actions: Deploy to icenux</text>
  <text x="132" y="308" class="t">self-hosted runner가 icenux 서버에서 실행</text>

  <path d="M450 320 V348" class="arrow" marker-end="url(#a)"/>
  <rect x="105" y="348" width="690" height="54" rx="12" class="box"/>
  <text x="132" y="371" class="h">test / type-check / build</text>
  <text x="132" y="390" class="t">dist/index.js 번들 생성</text>

  <path d="M450 402 V430" class="arrow" marker-end="url(#a)"/>
  <rect x="105" y="430" width="690" height="0" rx="12" class="box"/>
  <text x="106" y="430" class="small"></text>

  <rect x="105" y="408" width="690" height="54" rx="12" class="box"/>
  <text x="132" y="431" class="h">운영 디렉터리 배포 + PM2 재시작</text>
  <text x="132" y="450" class="t">~/projects/discord-bot 로 산출물 복사, discord-bot restart</text>

  <rect x="40" y="486" width="820" height="610" rx="20" class="server shadow"/>
  <text x="70" y="524" class="section">2. icenux 서버 런타임</text>
  <text x="70" y="548" class="small">운영 실행 디렉터리: /home/icenux/projects/discord-bot</text>

  <rect x="80" y="582" width="740" height="455" rx="18" class="box shadow"/>
  <text x="112" y="618" class="h">PM2 process: discord-bot</text>
  <text x="112" y="640" class="t">Node.js + discord.js + bundled dist/index.js</text>

  <rect x="120" y="680" width="270" height="76" rx="12" class="box"/>
  <text x="145" y="708" class="h">Discord Gateway</text>
  <text x="145" y="730" class="t">DM / 서버 메시지 수신</text>

  <rect x="510" y="680" width="270" height="76" rx="12" class="box"/>
  <text x="535" y="708" class="h">스케줄러</text>
  <text x="535" y="730" class="t">날씨 DM · 긱뉴스 DM</text>

  <path d="M255 756 V792" class="arrow" marker-end="url(#a)"/>
  <rect x="120" y="792" width="270" height="76" rx="12" class="box"/>
  <text x="145" y="820" class="h">관리자 처리</text>
  <text x="145" y="842" class="t">ADMIN_ID 확인, 명령어/자연어 DM</text>

  <path d="M255 868 V904" class="arrow" marker-end="url(#a)"/>
  <rect x="120" y="904" width="270" height="76" rx="12" class="box"/>
  <text x="145" y="932" class="h">aiService</text>
  <text x="145" y="954" class="t">AI_PROVIDER=codex</text>

  <path d="M390 942 H510" class="purple" marker-end="url(#p)"/>
  <rect x="510" y="904" width="270" height="76" rx="12" class="codex"/>
  <text x="535" y="932" class="h">CodexProvider</text>
  <text x="535" y="954" class="t">thread key 유지, turn 요청</text>

  <path d="M645 756 V904" class="purple" marker-end="url(#p)"/>

  <rect x="40" y="1136" width="820" height="128" rx="20" class="codex shadow"/>
  <text x="70" y="1174" class="section">3. Codex 연결 방식</text>

  <rect x="85" y="1198" width="215" height="48" rx="11" class="box"/>
  <text x="108" y="1228" class="h">codex app-server</text>

  <path d="M300 1222 H350" class="purple" marker-end="url(#p)"/>
  <rect x="350" y="1198" width="220" height="48" rx="11" class="box"/>
  <text x="374" y="1228" class="h">stdio JSON-RPC</text>

  <path d="M570 1222 H620" class="purple" marker-end="url(#p)"/>
  <rect x="620" y="1198" width="195" height="48" rx="11" class="box"/>
  <text x="644" y="1218" class="h">thread/start</text>
  <text x="644" y="1238" class="h">turn/start</text>

  <path d="M645 980 C645 1070, 192 1110, 192 1198" class="purple" marker-end="url(#p)"/>

  <rect x="430" y="792" width="350" height="76" rx="12" class="ext"/>
  <text x="455" y="820" class="h">외부 데이터</text>
  <text x="455" y="842" class="t">기상청 API · news.hada.io · 기사 원문</text>

  <path d="M645 756 V792" class="orange" marker-end="url(#o)"/>

  <rect x="40" y="1282" width="820" height="26" rx="10" class="note"/>
  <text x="64" y="1300" class="small">핵심: Discord 권한은 discord-bot만 보유. Codex는 봇 내부 작업 에이전트이며 HTTP API 직접 호출 구조가 아니다.</text>

  <text x="92" y="1070" class="small">배포 산출물: package.json, package-lock.json, ecosystem.config.cjs, dist/index.js</text>
  <text x="92" y="1090" class="small">운영 Codex sandbox: read-only / approval: never / CODEX_WORKDIR=/home/icenux/projects/discord-bot</text>
</svg>
