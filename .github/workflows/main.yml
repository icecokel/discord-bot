name: Deploy to icenux

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, icenux, discord-bot]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate command registry
        run: npm run gen:registry

      - name: Run tests
        run: npm test -- --runInBand

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Prepare deployment files
        run: |
          export PATH="$HOME/.local/npm-global/bin:$HOME/.local/bin:$PATH"
          DEPLOY_DIR="$HOME/projects/discord-bot"
          mkdir -p "$DEPLOY_DIR/dist" "$DEPLOY_DIR/logs"
          cp package.json package-lock.json ecosystem.config.cjs "$DEPLOY_DIR/"
          cp dist/index.js "$DEPLOY_DIR/dist/index.js"
          cd "$DEPLOY_DIR"
          npm ci --omit=dev --ignore-scripts

      - name: Restart PM2 process if available
        run: |
          export PATH="$HOME/.local/npm-global/bin:$HOME/.local/bin:$PATH"
          DEPLOY_DIR="$HOME/projects/discord-bot"
          if command -v pm2 >/dev/null 2>&1; then
            cd "$DEPLOY_DIR"
            pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs --update-env
            pm2 save
          else
            echo "PM2 is not installed on this runner. Deployment cannot restart discord-bot." >&2
            exit 1
          fi
