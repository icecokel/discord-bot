name: Deploy to Termux (Cloudflare Tunnel)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TERMUX
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TERMUX_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host ${{ secrets.TERMUX_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.TERMUX_USER }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  ProxyCommand cloudflared access ssh --hostname %h" >> ~/.ssh/config

      - name: Deploy bundle
        run: |
          scp dist/index.js ${{ secrets.TERMUX_HOST }}:~/projects/discord-bot/dist/index.js

      - name: Restart PM2 process
        run: |
          ssh ${{ secrets.TERMUX_HOST }} "cd ~/projects/discord-bot && pm2 restart discord-bot --update-env && pm2 save"
